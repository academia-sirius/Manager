<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esqueci a Senha - Manager</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .step {
        display: none;
      }
      .step.active {
        display: block;
      }
      .code-inputs {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin: 20px 0;
      }
      .code-inputs input {
        width: 45px;
        height: 55px;
        text-align: center;
        font-size: 1.5rem;
        font-weight: bold;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: rgba(15, 23, 42, 0.6);
        color: white;
      }
      .code-inputs input:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 3px var(--primary-glow);
      }
    </style>
  </head>
  <body>
    <div id="notification-container"></div>

    <div class="full-page">
      <div class="auth-container glass-card">
        <button class="btn-back" onclick="window.location.href = 'login.html'">
          <i class="fa-solid fa-arrow-left"></i>
        </button>

        <!-- Passo 1: Email -->
        <div id="step-1" class="step active">
          <h2>Recuperar Senha</h2>
          <p class="text-muted">
            Informe o email associado à sua conta para receber um código de
            recuperação.
          </p>
          <form id="form-forgot">
            <div class="input-group">
              <label>Email</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input
                  type="email"
                  id="forgot-email"
                  required
                  placeholder="centro@email.com"
                />
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
              Enviar Código
            </button>
          </form>
        </div>

        <!-- Passo 2: Código -->
        <div id="step-2" class="step">
          <h2>Verificar Código</h2>
          <p class="text-muted">
            Enviamos um código de 6 dígitos para
            <strong id="display-email"></strong>.
          </p>
          <form id="form-verify">
            <div class="code-inputs" id="code-container">
              <input type="text" maxlength="1" required data-index="0" />
              <input type="text" maxlength="1" required data-index="1" />
              <input type="text" maxlength="1" required data-index="2" />
              <input type="text" maxlength="1" required data-index="3" />
              <input type="text" maxlength="1" required data-index="4" />
              <input type="text" maxlength="1" required data-index="5" />
            </div>
            <button type="submit" class="btn btn-primary w-100">
              Verificar Código
            </button>
          </form>
        </div>

        <!-- Passo 3: Nova Senha -->
        <div id="step-3" class="step">
          <h2>Nova Senha</h2>
          <p class="text-muted">Crie uma nova senha segura para sua conta.</p>
          <form id="form-reset">
            <div class="input-group">
              <label>Nova Senha</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input
                  type="password"
                  id="reset-password"
                  required
                  minlength="12"
                  pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&._-]).{12,}"
                  title="A senha deve ter pelo menos 12 caracteres, incluindo letras maiúsculas, minúsculas, números e caracteres especiais"
                  placeholder="Mínimo 12 caracteres"
                />
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
              Redefinir Senha
            </button>
          </form>
        </div>
      </div>
      <div class="bg-shape shape-3"></div>
    </div>

    <script src="js/common.js"></script>
    <script>
      let currentEmail = "";
      let currentCode = "";

      function showStep(stepNum) {
        document
          .querySelectorAll(".step")
          .forEach((el) => el.classList.remove("active"));
        document.getElementById(`step-${stepNum}`).classList.add("active");
      }

      // Lógica do Código (Auto-focus)
      const inputs = document.querySelectorAll(".code-inputs input");
      inputs.forEach((input, idx) => {
        input.addEventListener("input", (e) => {
          if (e.target.value.length === 1 && idx < inputs.length - 1) {
            inputs[idx + 1].focus();
          }
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && !e.target.value && idx > 0) {
            inputs[idx - 1].focus();
          }
        });
        input.addEventListener("paste", (e) => {
          e.preventDefault();
          const pastedData = e.clipboardData
            .getData("text")
            .slice(0, 6)
            .replace(/[^0-9]/g, "");
          for (let i = 0; i < pastedData.length; i++) {
            if (inputs[i]) {
              inputs[i].value = pastedData[i];
              if (i < inputs.length - 1) inputs[i + 1].focus();
            }
          }
        });
      });

      // Passo 1: Pedir Código
      document
        .getElementById("form-forgot")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = e.target.querySelector("button");
          const email = document.getElementById("forgot-email").value;

          btn.disabled = true;
          btn.textContent = "Enviando...";

          try {
            await App.request("/auth/forgot-password", {
              method: "POST",
              body: JSON.stringify({ email }),
            });

            currentEmail = email;
            document.getElementById("display-email").textContent = email;
            App.showNotification("Código enviado (se o email existir)!");
            showStep(2);
            inputs[0].focus();
          } catch (err) {
            App.showNotification(
              err.message || "Erro ao processar pedido",
              "error",
            );
          } finally {
            btn.disabled = false;
            btn.textContent = "Enviar Código";
          }
        });

      // Passo 2: Verificar Código
      document
        .getElementById("form-verify")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = e.target.querySelector("button");

          const code = Array.from(inputs)
            .map((i) => i.value)
            .join("");
          if (code.length !== 6) {
            App.showNotification("Preencha os 6 dígitos", "error");
            return;
          }

          btn.disabled = true;
          btn.textContent = "Verificando...";

          try {
            await App.request("/auth/verify-code", {
              method: "POST",
              body: JSON.stringify({ email: currentEmail, code }),
            });

            currentCode = code;
            App.showNotification("Código validado!");
            showStep(3);
          } catch (err) {
            App.showNotification(
              err.message || "Código inválido ou expirado",
              "error",
            );
          } finally {
            btn.disabled = false;
            btn.textContent = "Verificar Código";
          }
        });

      // Passo 3: Resetar Senha
      document
        .getElementById("form-reset")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = e.target.querySelector("button");
          const novaSenha = document.getElementById("reset-password").value;

          btn.disabled = true;
          btn.textContent = "Redefinindo...";

          try {
            await App.request("/auth/reset-password", {
              method: "POST",
              body: JSON.stringify({
                email: currentEmail,
                code: currentCode,
                novaSenha,
              }),
            });

            App.showNotification("Senha alterada com sucesso! Faça login.");
            setTimeout(() => {
              window.location.href = "login.html";
            }, 1500);
          } catch (err) {
            App.showNotification(
              err.message || "Erro ao alterar senha",
              "error",
            );
            btn.disabled = false;
            btn.textContent = "Redefinir Senha";
          }
        });
    </script>
  </body>
</html>
